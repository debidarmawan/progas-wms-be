# Backend + Nginx — MySQL Aiven (dev open access: tls=skip-verify, tanpa ca.pem)

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: progas-backend
    restart: unless-stopped
    mem_limit: 200m
    env_file:
      - .env
    environment:
      GO_ENV: production
      PORT: "3131"
      DB_URL: ${DB_URL}
      DB_MAX_POOL: ${DB_MAX_POOL:-5}
      DB_CA_CERT: ${DB_CA_CERT:-}
    networks:
      - progas

  nginx:
    image: nginx:1.27-alpine
    container_name: progas-nginx
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - progas

networks:
  progas:
    driver: bridge
