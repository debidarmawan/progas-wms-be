definitions:
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role_id:
        type: string
    required:
    - email
    - name
    - password
    - role_id
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expired_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.Message:
    properties:
      message:
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RoleResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role_id:
        type: string
      role_name:
        type: string
    type: object
  global.Response-array_dto_RoleResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/dto.RoleResponse'
        type: array
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.LoginResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_Message:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.Message'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_RoleResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.RoleResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    email: debidarmawan1998@gmail.com
    name: DeboZero Corp Tech Team
  description: This is an API documentation of Progas WMS
  title: PROGAS WMS Backend API
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: Login
      parameters:
      - description: Login data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_LoginResponse'
      summary: Login
      tags:
      - Auth
  /logout:
    post:
      consumes:
      - application/json
      description: Logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Logout
      tags:
      - Auth
  /refresh-token:
    post:
      consumes:
      - application/json
      description: Refresh token
      parameters:
      - description: RefreshToken data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_LoginResponse'
      summary: Refresh token
      tags:
      - Auth
  /roles:
    get:
      consumes:
      - application/json
      description: Find all roles
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/global.Response-array_dto_RoleResponse'
            type: array
      security:
      - Bearer: []
      summary: Find all roles
      tags:
      - Role
  /roles/:id:
    get:
      consumes:
      - application/json
      description: Find role by id
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_RoleResponse'
      security:
      - Bearer: []
      summary: Find role by id
      tags:
      - Role
  /users:
    post:
      consumes:
      - application/json
      description: Create user
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Create user
      tags:
      - User
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
