definitions:
  dto.BarcodeListRequest:
    properties:
      barcodes:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - barcodes
    type: object
  dto.BarcodeOperationResponse:
    properties:
      barcodes:
        items:
          type: string
        type: array
      processed_count:
        type: integer
    type: object
  dto.CreateCustomerRequest:
    properties:
      address:
        type: string
      code:
        type: string
      cylinder_quota_limit:
        minimum: 0
        type: integer
      name:
        type: string
      phone:
        type: string
    required:
    - code
    - name
    type: object
  dto.CreateCylinderRequest:
    properties:
      barcode_sn:
        type: string
      item_id:
        type: string
      last_hydrotest_date:
        type: string
      owner_id:
        type: string
      ownership_type:
        type: string
    required:
    - barcode_sn
    - item_id
    - last_hydrotest_date
    - ownership_type
    type: object
  dto.CreateMasterItemRequest:
    properties:
      empty_weight_kg:
        minimum: 0
        type: number
      gas_type:
        type: string
      gas_weight_kg:
        minimum: 0
        type: number
      is_serialized:
        type: boolean
      min_stock_alert:
        minimum: 0
        type: integer
      name:
        type: string
      sku:
        type: string
    required:
    - name
    - sku
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role_id:
        type: string
    required:
    - email
    - name
    - password
    - role_id
    type: object
  dto.CustomerResponse:
    properties:
      address:
        type: string
      code:
        type: string
      cylinder_quota_limit:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      outstanding_count:
        type: integer
      phone:
        type: string
    type: object
  dto.CylinderResponse:
    properties:
      barcode_sn:
        type: string
      gas_type:
        type: string
      id:
        type: string
      item_id:
        type: string
      item_name:
        type: string
      last_hydrotest_date:
        type: string
      owner_id:
        type: string
      ownership_type:
        type: string
      status:
        type: string
    type: object
  dto.FillingBatchDetailResponse:
    properties:
      barcode_sn:
        type: string
      cylinder_id:
        type: string
      id:
        type: string
    type: object
  dto.FillingBatchResponse:
    properties:
      batch_number:
        type: string
      created_at:
        type: string
      cylinder_qty:
        type: integer
      details:
        items:
          $ref: '#/definitions/dto.FillingBatchDetailResponse'
        type: array
      gas_type:
        type: string
      id:
        type: string
      item_id:
        type: string
      item_name:
        type: string
      notes:
        type: string
      status:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      access_token:
        type: string
      expired_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.MasterItemResponse:
    properties:
      empty_weight_kg:
        type: number
      gas_type:
        type: string
      gas_weight_kg:
        type: number
      id:
        type: string
      is_serialized:
        type: boolean
      min_stock_alert:
        type: integer
      name:
        type: string
      sku:
        type: string
      stock_quantity:
        type: integer
    type: object
  dto.Message:
    properties:
      message:
        type: string
    type: object
  dto.PaginatedCustomerList:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.CustomerResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginatedCylinderList:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.CylinderResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginatedFillingBatchList:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.FillingBatchResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginatedMasterItemList:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.MasterItemResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginatedRoleList:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.RoleResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RoleResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  dto.SubmitFillingBatchRequest:
    properties:
      barcodes:
        items:
          type: string
        minItems: 1
        type: array
      item_id:
        type: string
      notes:
        type: string
    required:
    - barcodes
    - item_id
    type: object
  dto.UpdateCustomerRequest:
    properties:
      address:
        type: string
      cylinder_quota_limit:
        minimum: 0
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      phone:
        type: string
    required:
    - name
    type: object
  dto.UpdateMasterItemRequest:
    properties:
      empty_weight_kg:
        minimum: 0
        type: number
      gas_type:
        type: string
      gas_weight_kg:
        minimum: 0
        type: number
      min_stock_alert:
        minimum: 0
        type: integer
      name:
        type: string
    required:
    - name
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
      role_id:
        type: string
      role_name:
        type: string
    type: object
  global.Response-dto_BarcodeOperationResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.BarcodeOperationResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_CustomerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.CustomerResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_CylinderResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.CylinderResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_FillingBatchResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.FillingBatchResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.LoginResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_MasterItemResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.MasterItemResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_Message:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.Message'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_PaginatedCustomerList:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PaginatedCustomerList'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_PaginatedCylinderList:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PaginatedCylinderList'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_PaginatedFillingBatchList:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PaginatedFillingBatchList'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_PaginatedMasterItemList:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PaginatedMasterItemList'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_PaginatedRoleList:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.PaginatedRoleList'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  global.Response-dto_RoleResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.RoleResponse'
      error_code:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
info:
  contact:
    email: debidarmawan1998@gmail.com
    name: DeboZero Corp Tech Team
  description: This is an API documentation of Progas WMS
  title: PROGAS WMS Backend API
  version: "1.0"
paths:
  /customers:
    get:
      consumes:
      - application/json
      description: Find all customers with pagination and search
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Search by code, name, or phone
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_PaginatedCustomerList'
      security:
      - Bearer: []
      summary: Find all customers
      tags:
      - Customer
    post:
      consumes:
      - application/json
      description: Create customer with cylinder quota limit
      parameters:
      - description: Create customer request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Create customer
      tags:
      - Customer
  /customers/{id}:
    get:
      consumes:
      - application/json
      description: Find customer by id
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_CustomerResponse'
      security:
      - Bearer: []
      summary: Find customer by id
      tags:
      - Customer
    put:
      consumes:
      - application/json
      description: Update customer by id
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: string
      - description: Update customer request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Update customer
      tags:
      - Customer
  /cylinders:
    get:
      consumes:
      - application/json
      description: Find all registered cylinders with pagination and search
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Search by barcode, status, ownership, or item name/SKU/gas type
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_PaginatedCylinderList'
      security:
      - Bearer: []
      summary: Find all cylinders
      tags:
      - Cylinder
    post:
      consumes:
      - application/json
      description: Register a new cylinder with unique barcode
      parameters:
      - description: Register cylinder request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCylinderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Register cylinder
      tags:
      - Cylinder
  /cylinders/{id}:
    get:
      consumes:
      - application/json
      description: Find cylinder by id
      parameters:
      - description: Cylinder ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_CylinderResponse'
      security:
      - Bearer: []
      summary: Find cylinder by id
      tags:
      - Cylinder
  /inbound/empty-receive:
    post:
      consumes:
      - application/json
      description: Receive empty cylinders returned from customer (OUTSTANDING/IN_TRANSIT
        → EMPTY)
      parameters:
      - description: Barcode list
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BarcodeListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_BarcodeOperationResponse'
      security:
      - Bearer: []
      summary: Empty cylinder receiving
      tags:
      - Inbound
  /login:
    post:
      consumes:
      - application/json
      description: Login
      parameters:
      - description: Login data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_LoginResponse'
      summary: Login
      tags:
      - Auth
  /logout:
    post:
      consumes:
      - application/json
      description: Logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Logout
      tags:
      - Auth
  /master-items:
    get:
      consumes:
      - application/json
      description: Find all master items with pagination and search
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Search by name, SKU, or gas type
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_PaginatedMasterItemList'
      security:
      - Bearer: []
      summary: Find all master items
      tags:
      - Master Item
    post:
      consumes:
      - application/json
      description: Create master item (serialized gas or non-serialized spare part)
      parameters:
      - description: Create master item request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateMasterItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Create master item
      tags:
      - Master Item
  /master-items/{id}:
    get:
      consumes:
      - application/json
      description: Find master item by id
      parameters:
      - description: Master Item ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_MasterItemResponse'
      security:
      - Bearer: []
      summary: Find master item by id
      tags:
      - Master Item
    put:
      consumes:
      - application/json
      description: Update master item by id
      parameters:
      - description: Master Item ID
        in: path
        name: id
        required: true
        type: string
      - description: Update master item request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMasterItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Update master item
      tags:
      - Master Item
  /production/filling-batches:
    get:
      consumes:
      - application/json
      description: List filling batches with pagination and search
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Search by batch number or gas type
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_PaginatedFillingBatchList'
      security:
      - Bearer: []
      summary: List filling batches
      tags:
      - Production
    post:
      consumes:
      - application/json
      description: Create and complete a filling batch atomically (validates status
        & cross-gas, sets cylinders to READY)
      parameters:
      - description: Filling batch request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SubmitFillingBatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_FillingBatchResponse'
      security:
      - Bearer: []
      summary: Submit filling batch
      tags:
      - Production
  /production/filling-batches/{id}:
    get:
      consumes:
      - application/json
      description: Get filling batch detail including scanned cylinders
      parameters:
      - description: Filling batch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_FillingBatchResponse'
      security:
      - Bearer: []
      summary: Get filling batch by id
      tags:
      - Production
  /production/qc/pre-fill:
    post:
      consumes:
      - application/json
      description: Pass pre-fill inspection (EMPTY → READY_TO_FILL)
      parameters:
      - description: Barcode list
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BarcodeListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_BarcodeOperationResponse'
      security:
      - Bearer: []
      summary: Pre-fill QC
      tags:
      - Production
  /refresh-token:
    post:
      consumes:
      - application/json
      description: Refresh token
      parameters:
      - description: RefreshToken data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_LoginResponse'
      summary: Refresh token
      tags:
      - Auth
  /roles/:
    get:
      consumes:
      - application/json
      description: Find all roles with pagination and search
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Search by role name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_PaginatedRoleList'
      security:
      - Bearer: []
      summary: Find all roles
      tags:
      - Role
  /roles/{id}:
    get:
      consumes:
      - application/json
      description: Find role by id
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_RoleResponse'
      security:
      - Bearer: []
      summary: Find role by id
      tags:
      - Role
  /users:
    post:
      consumes:
      - application/json
      description: Create user
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/global.Response-dto_Message'
      security:
      - Bearer: []
      summary: Create user
      tags:
      - User
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
