services:
  mysql:
    image: mysql:8.4
    container_name: progas-mysql
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-progas_wms}
      MYSQL_USER: ${MYSQL_USER:-progas_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
    ports:
      # Default 127.0.0.1: hanya dari VPS / SSH tunnel. Untuk DBeaver langsung: MYSQL_BIND=0.0.0.0 + firewall.
      - "${MYSQL_BIND:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - progas

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: progas-wms-be
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - .env
    expose:
      - "3131"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - progas

  nginx:
    image: nginx:1.27-alpine
    container_name: progas-nginx
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "3131:3131"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - progas

volumes:
  mysql_data:

networks:
  progas:
    driver: bridge
